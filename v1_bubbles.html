<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>✦ 给好朋友的一封信 ✦</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:"PingFang SC","Microsoft YaHei",sans-serif;-webkit-tap-highlight-color:transparent}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
#stage{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1;width:88%;max-width:380px;text-align:center}
.line{opacity:0;transform:translateY(20px);transition:opacity .6s,transform .6s;margin:6px 0;color:#fff8e8;font-size:17px;line-height:1.8;text-shadow:0 0 12px rgba(255,200,120,.3)}
.line.show{opacity:1;transform:translateY(0)}
.line.pink{color:#ffb0c8}
.line.gold{color:#f5c070}
.line.dim{color:rgba(255,240,220,.5);font-size:15px}
.line.cyan{color:#8cd0e0}
.line.green{color:#a8d8a0}
.line.big{font-size:22px;margin:14px 0}
.line.huge{font-size:30px;font-weight:bold;margin:18px 0}
#hint{position:fixed;bottom:60px;left:0;width:100%;text-align:center;z-index:99;color:rgba(255,255,255,.3);font-size:14px;display:none}
#hint.show{display:block;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:.8}}
.gift-wrap{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2}
.gift-wrap svg{width:min(160px,50vw);animation:float 2s ease-in-out infinite alternate;filter:drop-shadow(0 0 40px rgba(255,180,80,.6))}
@keyframes float{from{transform:translateY(-8px) rotate(-5deg)}to{transform:translateY(8px) rotate(5deg)}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="stage"></div>
<div id="hint">✦ 轻触屏幕继续 ✦</div>
<audio id="bgm" src="bgm.mp3" loop preload="auto" playsinline style="display:none"></audio>
<script>
// BGM
const bgm=document.getElementById('bgm');bgm.volume=.35;
function startBGM(){bgm.play().then(()=>{}).catch(()=>setTimeout(()=>bgm.play().catch(()=>{}),500))}

// Canvas — warm bubbles rising
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W,H;function rs(){W=cv.width=innerWidth;H=cv.height=innerHeight}rs();addEventListener('resize',rs);

const bubbles=[];
for(let i=0;i<35;i++){
  bubbles.push({x:Math.random()*W,y:H+Math.random()*H*2,r:Math.random()*40+10,vy:-(Math.random()*.6+.2),vx:Math.random()*.4-.2,hue:Math.random()<.5?35:15,alpha:Math.random()*.15+.05,wob:Math.random()*6.28,ws:Math.random()*.02+.01});
}

function draw(){
  // Warm gradient background
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#2a1a18');
  bg.addColorStop(.4,'#251516');
  bg.addColorStop(1,'#1a0e10');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // Glow spots
  const t=Date.now()/1000;
  for(let i=0;i<4;i++){
    const x=W*(.2+i*.2+.08*Math.sin(t*.2+i));
    const y=H*(.3+.15*Math.cos(t*.15+i*1.5));
    const r=120+Math.sin(t*.3+i)*30;
    const g=ctx.createRadialGradient(x,y,0,x,y,r);
    const hue=[25,40,350,15][i];
    g.addColorStop(0,`hsla(${hue},50%,50%,.08)`);
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.fillRect(x-r,y-r,r*2,r*2);
  }

  // Bubbles rising
  bubbles.forEach(b=>{
    b.y+=b.vy;b.x+=Math.sin(b.wob)*b.vx;b.wob+=b.ws;
    if(b.y<-b.r*2){b.y=H+b.r;b.x=Math.random()*W}
    const g=ctx.createRadialGradient(b.x-b.r*.3,b.y-b.r*.3,0,b.x,b.y,b.r);
    g.addColorStop(0,`hsla(${b.hue},60%,70%,${b.alpha*2})`);
    g.addColorStop(.6,`hsla(${b.hue},50%,50%,${b.alpha})`);
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,6.28);ctx.fill();
    // Highlight
    ctx.fillStyle=`rgba(255,240,220,${b.alpha*.5})`;
    ctx.beginPath();ctx.arc(b.x-b.r*.3,b.y-b.r*.3,b.r*.15,0,6.28);ctx.fill();
  });

  requestAnimationFrame(draw);
}draw();

// Floating petals
const pc='*✦✿❀♥♡•✧';
setInterval(()=>{
  if(document.querySelectorAll('.petal').length>50)return;
  if(Math.random()>.55)return;
  const e=document.createElement('div');
  e.className='petal';e.textContent=pc[Math.random()*pc.length|0];
  e.style.cssText=`position:fixed;z-index:1;pointer-events:none;left:${Math.random()*90+5}%;top:-5%;font-size:${Math.random()*14+10}px;color:${['#f5c070','#f0a8c8','#ffb8a0','#e8d5b0','#f5d870'][Math.random()*5|0]};animation:fall ${Math.random()*6+4}s linear forwards;opacity:${Math.random()*.4+.5}`;
  document.body.appendChild(e);setTimeout(()=>e.remove(),12000);
},200);
const s=document.createElement('style');
s.textContent='@keyframes fall{0%{opacity:1;transform:translateY(0) rotate(0)}80%{opacity:1}100%{opacity:0;transform:translateY(105vh) rotate(540deg)}}';
document.head.appendChild(s);

// Scenes — no specific events, universal friendship
const scenes=[
  [{t:'嘿，',c:'dim'},{t:'有些话平时不太说，',c:'dim',w:1600},{t:'但今天想认真讲一下。',c:'cyan',w:2000}],
  [{t:'有你这个朋友，',c:''},{t:'我一直觉得挺幸运的。',c:'pink',w:2200}],
  [{t:'不用天天联系，',c:'dim',w:1400},{t:'但知道你在，',c:'cyan',w:1600},{t:'就很安心。',c:'gold',w:2000}],
  [{t:'好朋友就是这样——',c:'dim',w:1600},{t:'不用多说什么，',c:''},{t:'都懂。',c:'cyan big',w:2000}],
  [{t:'谢谢你一直都在。',c:'gold big',w:2600}],
  [{type:'g'}],
  [{t:'不管以后怎样，',c:'dim',w:1400},{t:'希望我们一直是朋友。',c:'pink big',w:2600}],
  [{t:'',c:'',w:400},{t:'友谊万岁。',c:'pink huge',w:2800}],
  [{type:'g'}],
  [{t:'这份心意送给你，',c:'dim',w:1600},{t:'说的每一句都是真的。',c:'cyan',w:2000},{t:'谢谢你。',c:'gold big',w:2400}],
];

let si=0,li=0,busy=false,timer=null;
const stage=document.getElementById('stage'),hint=document.getElementById('hint');
function clearAll(){stage.innerHTML='';hint.classList.remove('show');const h=document.querySelector('.gift-wrap');if(h)h.remove()}
function showLine(){
  const scene=scenes[si];
  if(li>=scene.length){busy=false;if(si===5||si===8){si++;if(si<scenes.length)showScene();return}hint.classList.add('show');return}
  const l=scene[li++];
  if(l.type==='g'){
    const w=document.createElement('div');w.className='gift-wrap';
    w.innerHTML='<svg viewBox="0 0 100 110"><rect x="15" y="40" width="70" height="60" rx="4" fill="#f5c070" stroke="#ffd990" stroke-width="2"/><rect x="10" y="35" width="80" height="12" rx="3" fill="#f0a8c8" stroke="#ffc0d0" stroke-width="2"/><path d="M50 35 C30 20,20 25,25 30 C30 35,50 35,50 35 C50 35,70 35,75 30 C80 25,70 20,50 35Z" fill="#f0a8c8" stroke="#ffc0d0" stroke-width="2"/><rect x="46" y="35" width="8" height="65" fill="#e898b8"/></svg>';
    document.body.appendChild(w);
    timer=setTimeout(()=>{w.remove();li=0;si++;if(si<scenes.length)showScene()},4000);return;
  }
  const el=document.createElement('div');el.className='line';if(l.c)el.className+=' '+l.c;
  el.textContent=l.t;stage.appendChild(el);
  requestAnimationFrame(()=>el.classList.add('show'));
  timer=setTimeout(showLine,l.w||(l.t.trim()?l.t.length*65+400:300));
}
function showScene(){if(si>=scenes.length){hint.classList.remove('show');return}clearAll();li=0;busy=true;showLine()}
function advance(){startBGM();if(busy)return;if(timer)clearTimeout(timer);hint.classList.remove('show');si++;if(si>=scenes.length){hint.classList.remove('show');return}showScene()}
document.addEventListener('click',advance);
document.addEventListener('touchend',e=>{e.preventDefault();advance()},{passive:false});
showScene(0);
</script>
</body>
</html>
